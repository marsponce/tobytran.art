# .github/workflows/enforce-base-branch.yml
name: Enforce base branch
on:
  pull_request:
    branches: [main]
jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - name: Check base branch
        if: github.base_ref == 'main' && github.head_ref != 'dev'
        run: |
          echo "PRs to main must come from dev"
          exit 1
